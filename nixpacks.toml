[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.setuptools", "python311Packages.wheel", "libGL", "libGLU", "glib"]

[phases.build]
cmds = [
  "python3.11 -m pip install --break-system-packages -r requirements.txt"
]

[start]
cmd = "python3.11 -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
